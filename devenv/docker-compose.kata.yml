# Linux/KVM override for validating Memoh workspace containers with Kata.
#
# Host prerequisites:
# - /dev/kvm is available to Docker.
# - Kata is installed on the host.
# - MEMOH_KATA_SHIM_PATH points to containerd-shim-kata-v2.
#   Default: /opt/kata/bin/containerd-shim-kata-v2
#
# Start:
#   mise run dev:kata
# Verify:
#   mise run test:kata

services:
  migrate:
    image: ${MEMOH_KATA_DEV_IMAGE:-memoh-dev-server-kata}
    build:
      context: ..
      dockerfile: devenv/Dockerfile.server.kata
    environment:
      CONFIG_PATH: /workspace/devenv/app.kata.dev.toml

  server:
    image: ${MEMOH_KATA_DEV_IMAGE:-memoh-dev-server-kata}
    build:
      context: ..
      dockerfile: devenv/Dockerfile.server.kata
    environment:
      CONFIG_PATH: /workspace/devenv/app.kata.dev.toml
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - type: bind
        source: ${MEMOH_KATA_SHIM_PATH:-/opt/kata/bin/containerd-shim-kata-v2}
        target: /usr/local/bin/containerd-shim-kata-v2
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${MEMOH_KATA_CONFIG_DIR:-/etc/kata-containers}
        target: /etc/kata-containers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${MEMOH_KATA_SHARE_DIR:-/usr/share/kata-containers}
        target: /usr/share/kata-containers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${MEMOH_KATA_OPT_DIR:-/opt/kata}
        target: /opt/kata
        read_only: true
        bind:
          create_host_path: false
