# Memoh development configuration
# Connects to devenv/docker-compose.yml infrastructure

[log]
level = "debug"
format = "text"

[server]
addr = ":8080"

[admin]
username = "admin"
password = "admin123"
email = "dev@memoh.local"

[auth]
jwt_secret = "memoh-dev-secret-do-not-use-in-production"
jwt_expires_in = "168h"

timezone = "UTC"

[database]
# Memoh now supports PostgreSQL only.
driver = "postgres"

[container]
# Development runs nested containerd inside the server container, matching the
# production Docker Compose image.
backend = "containerd"
# registry = "memoh.cn"  # Uncomment for China mainland mirror
default_image = "memohai/workspace:debian"
image_pull_policy = "if_not_present"
# containerd snapshotter and CNI settings for bot workspace containers.
snapshotter = "overlayfs"
data_root = "/opt/memoh/data"
runtime_dir = "/opt/memoh/runtime"
cni_bin_dir = "/opt/cni/bin"
cni_conf_dir = "/etc/cni/net.d"

[containerd]
# Embedded containerd socket inside the dev server container.
socket_path = "/run/containerd/containerd.sock"
namespace = "default"
# Set to "io.containerd.kata.v2" only in a Linux/KVM test environment with Kata installed.
runtime_type = "io.containerd.runc.v2"

[docker]
# Used only when [container].backend = "docker"; the dev Compose stack uses containerd.
host = ""

[postgres]
host = "postgres"
port = 5432
# Owner/DDL role: runs migrations and owns the tables (bypasses FORCE RLS).
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"
# Restricted runtime role (memoh_app), created by migration 0107. Non-owner,
# non-superuser, so FORCE ROW LEVEL SECURITY enforces team isolation.
app_user = "memoh_app"
app_password = "memoh_app"

[pgvector]
enabled = true
host = "127.0.0.1"
port = 5433
user = "memoh"
password = "memoh123"
database = "memoh_vector"
sslmode = "disable"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"

[web]
host = "0.0.0.0"
port = 8082
