# Development configuration for validating containerd + Kata workspace runtime.
# Requires a Linux host with KVM and Kata mounted into the dev server container
# via devenv/docker-compose.kata.yml.

[log]
level = "info"
format = "text"

[server]
addr = ":8080"
rpc_listen_addr = ":9090"

[channel]
addr = ":8081"
rpc_listen_addr = ":9091"

[internal_rpc]
server_target = "server:9090"
channel_target = "channel:9091"
shared_secret = "memoh-dev-internal-rpc-secret"

[admin]
username = "admin"
password = "admin123"
email = "admin@memoh.local"

[auth]
jwt_secret = "DEV-CHANGE-ME"
jwt_expires_in = "168h"

timezone = "UTC"

[database]
driver = "postgres"

[container]
backend = "containerd"
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
snapshotter = "overlayfs"
data_root = "/opt/memoh/data"
runtime_dir = "/opt/memoh/runtime"
cni_bin_dir = "/opt/cni/bin"
cni_conf_dir = "/etc/cni/net.d"

[containerd]
socket_path = "/run/containerd/containerd.sock"
namespace = "default"
runtime_type = "io.containerd.kata.v2"

[docker]
host = ""

[postgres]
host = "postgres"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[pgvector]
enabled = true
host = "127.0.0.1"
port = 5433
user = "memoh"
password = "memoh123"
database = "memoh_vector"
sslmode = "disable"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"

[web]
host = "127.0.0.1"
port = 8082
