name: "memoh"
services:
  postgres:
    image: postgres:18-alpine
    container_name: memoh-postgres
    environment:
      POSTGRES_DB: memoh
      POSTGRES_USER: memoh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoh123}
    volumes:
      - postgres_data:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoh"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - memoh-network

  pgvector:
    image: pgvector/pgvector:pg18
    container_name: memoh-pgvector
    environment:
      POSTGRES_DB: memoh_vector
      POSTGRES_USER: memoh
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-${POSTGRES_PASSWORD:-memoh123}}
    volumes:
      - pgvector_data:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoh -d memoh_vector"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - memoh-network

  migrate:
    image: memohai/server:latest
    container_name: memoh-migrate
    entrypoint: ["/app/memoh-server", "migrate", "up"]
    volumes:
      - ${MEMOH_CONFIG:-./config.toml}:/app/config.toml:ro
      - memoh_data:/opt/memoh/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - memoh-network

  server:
    image: memohai/server:latest
    container_name: memoh-server
    privileged: true
    pid: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Proxy: use host.docker.internal for localhost proxies, e.g.
      #   HTTP_PROXY=http://host.docker.internal:7890 docker compose up -d
      HTTP_PROXY: "${HTTP_PROXY:-${http_proxy:-}}"
      HTTPS_PROXY: "${HTTPS_PROXY:-${https_proxy:-}}"
      NO_PROXY: "${NO_PROXY:-127.0.0.1,localhost},postgres,pgvector,server,channel,web,migrate,webhook-tunnel,memoh-postgres,memoh-pgvector,memoh-server,memoh-channel,memoh-web,memoh-migrate,memoh-webhook-tunnel"
      http_proxy: "${http_proxy:-${HTTP_PROXY:-}}"
      https_proxy: "${https_proxy:-${HTTPS_PROXY:-}}"
      no_proxy: "${no_proxy:-${NO_PROXY:-127.0.0.1,localhost}},postgres,pgvector,server,channel,web,migrate,webhook-tunnel,memoh-postgres,memoh-pgvector,memoh-server,memoh-channel,memoh-web,memoh-migrate,memoh-webhook-tunnel"
      MEMOH_INTERNAL_RPC_SHARED_SECRET: "${MEMOH_INTERNAL_RPC_SHARED_SECRET:?MEMOH_INTERNAL_RPC_SHARED_SECRET is required}"
      MEMOH_INTERNAL_RPC_SERVER_TARGET: "server:9090"
      MEMOH_INTERNAL_RPC_CHANNEL_TARGET: "channel:9091"
      MEMOH_DISPLAY_WEBRTC_UDP_PORT_MIN: "${MEMOH_DISPLAY_WEBRTC_UDP_PORT_MIN:-30000}"
      MEMOH_DISPLAY_WEBRTC_UDP_PORT_MAX: "${MEMOH_DISPLAY_WEBRTC_UDP_PORT_MAX:-30100}"
    volumes:
      - ${MEMOH_CONFIG:-./config.toml}:/app/config.toml:ro
      - ./conf/providers:/app/conf/providers:ro
      - containerd_data:/var/lib/containerd
      - server_cni_state:/var/lib/cni
      - memoh_data:/opt/memoh/data
      # Expose host CDI specs to the nested containerd used for bot workspaces.
      - /etc/cdi:/etc/cdi:ro
      - /var/run/cdi:/var/run/cdi:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:8080"
      - "1455:8080"
      - "${MEMOH_DISPLAY_WEBRTC_UDP_PORT_MIN:-30000}-${MEMOH_DISPLAY_WEBRTC_UDP_PORT_MAX:-30100}:${MEMOH_DISPLAY_WEBRTC_UDP_PORT_MIN:-30000}-${MEMOH_DISPLAY_WEBRTC_UDP_PORT_MAX:-30100}/udp"
    expose:
      - "9090"
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgvector:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - memoh-network

  channel:
    image: memohai/server:latest
    container_name: memoh-channel
    entrypoint: ["/app/memoh-channel", "serve"]
    environment:
      HTTP_PROXY: "${HTTP_PROXY:-${http_proxy:-}}"
      HTTPS_PROXY: "${HTTPS_PROXY:-${https_proxy:-}}"
      NO_PROXY: "${NO_PROXY:-127.0.0.1,localhost},postgres,server,channel,webhook-tunnel,memoh-postgres,memoh-server,memoh-channel,memoh-webhook-tunnel"
      http_proxy: "${http_proxy:-${HTTP_PROXY:-}}"
      https_proxy: "${https_proxy:-${HTTPS_PROXY:-}}"
      no_proxy: "${no_proxy:-${NO_PROXY:-127.0.0.1,localhost}},postgres,server,channel,webhook-tunnel,memoh-postgres,memoh-server,memoh-channel,memoh-webhook-tunnel"
      MEMOH_INTERNAL_RPC_SHARED_SECRET: "${MEMOH_INTERNAL_RPC_SHARED_SECRET:?MEMOH_INTERNAL_RPC_SHARED_SECRET is required}"
      MEMOH_INTERNAL_RPC_SERVER_TARGET: "server:9090"
      MEMOH_INTERNAL_RPC_CHANNEL_TARGET: "channel:9091"
      MEMOH_WEBHOOK_TUNNEL_MODE: "${MEMOH_WEBHOOK_TUNNEL_MODE:-}"
      MEMOH_WEBHOOK_PUBLIC_BASE_URL: "${MEMOH_WEBHOOK_PUBLIC_BASE_URL:-}"
      MEMOH_WEBHOOK_TUNNEL_LISTEN_ADDR: ":18734"
      MEMOH_WEBHOOK_TUNNEL_METRICS_URL: "http://webhook-tunnel:18735"
    volumes:
      - ${MEMOH_CONFIG:-./config.toml}:/app/config.toml:ro
      - memoh_data:/opt/memoh/data
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "8081"
      - "9091"
      - "18734"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - memoh-network

  webhook-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: memoh-webhook-tunnel
    command: tunnel --no-autoupdate --url http://channel:18734 --metrics 0.0.0.0:18735
    profiles: [webhook-tunnel]
    environment:
      HTTP_PROXY: "${HTTP_PROXY:-${http_proxy:-}}"
      HTTPS_PROXY: "${HTTPS_PROXY:-${https_proxy:-}}"
      NO_PROXY: "${NO_PROXY:-127.0.0.1,localhost},channel,memoh-channel"
      http_proxy: "${http_proxy:-${HTTP_PROXY:-}}"
      https_proxy: "${https_proxy:-${HTTPS_PROXY:-}}"
      no_proxy: "${no_proxy:-${NO_PROXY:-127.0.0.1,localhost}},channel,memoh-channel"
    depends_on:
      - channel
    expose:
      - "18735"
    restart: unless-stopped
    networks:
      - memoh-network

  web:
    image: memohai/web:latest
    container_name: memoh-web
    environment:
      MEMOH_SERVER_UPSTREAM: ${MEMOH_SERVER_UPSTREAM:-memoh-server:8080}
      MEMOH_CHANNEL_UPSTREAM: ${MEMOH_CHANNEL_UPSTREAM:-memoh-channel:8081}
    ports:
      - "8082:8082"
      # HTTPS + HTTP/2：h2 多路复用可避免多标签页的 SSE 长连接占满浏览器对单
      # origin 的 ~6 条 HTTP/1.1 连接、导致页面卡死（#822）。取消下面两处注释
      # 并放入证书后自动启用（自签 / mkcert / Let's Encrypt 均可）。
      # - "8443:8443"
    # volumes:
    #   - ./certs:/etc/nginx/certs:ro   # 需包含 server.crt 与 server.key
    depends_on:
      server:
        condition: service_healthy
      channel:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - memoh-network

volumes:
  postgres_data:
    driver: local
  pgvector_data:
    driver: local
  containerd_data:
    driver: local
  memoh_data:
    driver: local
  server_cni_state:
    driver: local
  openviking_data:
    driver: local

networks:
  memoh-network:
    driver: bridge
