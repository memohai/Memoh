# Linux/KVM override for validating or deploying Memoh workspace containers
# with containerd's Kata runtime.
#
# Host prerequisites:
# - /dev/kvm is available to Docker.
# - Kata is installed on the host.
# - MEMOH_KATA_SHIM_PATH points to containerd-shim-kata-v2.
#   Default: /opt/kata/bin/containerd-shim-kata-v2
#
# Example:
#   MEMOH_CONFIG=./conf/app.kata.docker.toml \
#     docker compose -f docker-compose.yml -f docker-compose.kata.yml up --build

services:
  migrate:
    image: ${MEMOH_KATA_SERVER_IMAGE:-memohai/server:kata}
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: server-kata
    volumes:
      - ${MEMOH_CONFIG:-./conf/app.kata.docker.toml}:/app/config.toml:ro

  server:
    image: ${MEMOH_KATA_SERVER_IMAGE:-memohai/server:kata}
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: server-kata
    volumes:
      - ${MEMOH_CONFIG:-./conf/app.kata.docker.toml}:/app/config.toml:ro
      - type: bind
        source: ${MEMOH_KATA_SHIM_PATH:-/opt/kata/bin/containerd-shim-kata-v2}
        target: /usr/local/bin/containerd-shim-kata-v2
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${MEMOH_KATA_CONFIG_DIR:-/etc/kata-containers}
        target: /etc/kata-containers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${MEMOH_KATA_SHARE_DIR:-/usr/share/kata-containers}
        target: /usr/share/kata-containers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${MEMOH_KATA_OPT_DIR:-/opt/kata}
        target: /opt/kata
        read_only: true
        bind:
          create_host_path: false
    devices:
      - /dev/kvm:/dev/kvm
