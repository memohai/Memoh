syntax = "proto3";

package memoh.runtime.v1;

option go_package = "github.com/memohai/memoh/internal/rpc/runtimepb";

// RuntimeService is the narrow control plane shared by the Server and Channel
// processes. Method names are stable protocol identifiers; payloads are JSON
// encodings of package-owned DTOs, never database or Fx types.
service RuntimeService {
  rpc Call(CallRequest) returns (CallResponse);
}

message CallRequest {
  string method = 1;
  bytes payload = 2;
}

message CallResponse {
  bytes payload = 1;
}
