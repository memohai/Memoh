name: ESLint

on:
  push:
    branches: ["main"]
    paths:
      - "apps/**/*.js"
      - "apps/**/*.cjs"
      - "apps/**/*.mjs"
      - "apps/**/*.ts"
      - "apps/**/*.tsx"
      - "apps/**/*.vue"
      - "apps/web/src/store/__fixtures__/runtime-*.contract.json"
      - "packages/**"
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.tsx"
      - "packages/**/*.vue"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "eslint.config.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/eslint.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/**/*.js"
      - "apps/**/*.cjs"
      - "apps/**/*.mjs"
      - "apps/**/*.ts"
      - "apps/**/*.tsx"
      - "apps/**/*.vue"
      - "apps/web/src/store/__fixtures__/runtime-*.contract.json"
      - "packages/**"
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.tsx"
      - "packages/**/*.vue"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "eslint.config.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/eslint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Vitest
        run: pnpm test --run --testTimeout=15000 apps/web/src/composables/api/useChat.ws.test.ts apps/web/src/store/session-runtime-reducer.test.ts apps/web/src/store/chat/approval-responses.test.ts apps/web/src/store/chat/assistant-streams.test.ts apps/web/src/store/chat/realtime.test.ts apps/web/src/store/chat/transcript.test.ts apps/web/src/store/chat-list.test.ts
