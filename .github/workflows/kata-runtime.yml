name: Kata Runtime

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/kata-runtime.yml"
      - "conf/app.kata.docker.toml"
      - "devenv/app.kata.dev.toml"
      - "devenv/Dockerfile.server.kata"
      - "devenv/docker-compose.kata.yml"
      - "docker/Dockerfile.server"
      - "docker-compose.kata.yml"
      - "docs/kata-containerd.md"
      - "mise.toml"
      - "scripts/check-kata-dev-env.sh"
      - "scripts/smoke-containerd-runtime.sh"
      - "scripts/test-containerd-kata-compose-e2e.sh"
      - "scripts/test-containerd-kata-e2e.sh"
      - "scripts/test-containerd-kata-running.sh"
      - "scripts/test-kata-evidence-validator.sh"
      - "scripts/validate-containerd-smoke-evidence.sh"
      - "scripts/validate-kata-evidence.sh"
      - "scripts/verify-containerd-kata.sh"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/kata-runtime.yml"
      - "conf/app.kata.docker.toml"
      - "devenv/app.kata.dev.toml"
      - "devenv/Dockerfile.server.kata"
      - "devenv/docker-compose.kata.yml"
      - "docker/Dockerfile.server"
      - "docker-compose.kata.yml"
      - "docs/kata-containerd.md"
      - "mise.toml"
      - "scripts/check-kata-dev-env.sh"
      - "scripts/smoke-containerd-runtime.sh"
      - "scripts/test-containerd-kata-compose-e2e.sh"
      - "scripts/test-containerd-kata-e2e.sh"
      - "scripts/test-containerd-kata-running.sh"
      - "scripts/test-kata-evidence-validator.sh"
      - "scripts/validate-containerd-smoke-evidence.sh"
      - "scripts/validate-kata-evidence.sh"
      - "scripts/verify-containerd-kata.sh"
  workflow_dispatch:
    inputs:
      run_kata_e2e:
        description: "Run Linux/KVM Kata E2E on a self-hosted runner"
        required: true
        type: boolean
        default: false
      run_compose_e2e:
        description: "Also run the production Compose Kata E2E"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Check shell scripts
        run: |
          bash -n \
            scripts/check-kata-dev-env.sh \
            scripts/smoke-containerd-runtime.sh \
            scripts/test-containerd-kata-compose-e2e.sh \
            scripts/test-containerd-kata-e2e.sh \
            scripts/test-containerd-kata-running.sh \
            scripts/test-kata-evidence-validator.sh \
            scripts/validate-containerd-smoke-evidence.sh \
            scripts/validate-kata-evidence.sh \
            scripts/verify-containerd-kata.sh

      - name: Validate evidence checks
        run: scripts/test-kata-evidence-validator.sh

      - name: Render Kata compose configs
        run: |
          docker compose -f devenv/docker-compose.yml -f devenv/docker-compose.kata.yml config > /tmp/memoh-kata-dev-compose.yml
          docker compose -f docker-compose.yml -f docker-compose.kata.yml config > /tmp/memoh-kata-compose.yml

          grep -F 'target: server-kata' /tmp/memoh-kata-compose.yml
          grep -F 'image: memohai/server:kata' /tmp/memoh-kata-compose.yml
          grep -F 'source: /dev/kvm' /tmp/memoh-kata-compose.yml
          grep -F 'target: /dev/kvm' /tmp/memoh-kata-compose.yml
          grep -F 'target: /usr/local/bin/containerd-shim-kata-v2' /tmp/memoh-kata-compose.yml
          grep -F 'create_host_path: false' /tmp/memoh-kata-compose.yml

          grep -F 'image: memoh-dev-server-kata' /tmp/memoh-kata-dev-compose.yml
          grep -F 'target: /usr/local/bin/containerd-shim-kata-v2' /tmp/memoh-kata-dev-compose.yml
          grep -F 'create_host_path: false' /tmp/memoh-kata-dev-compose.yml

      - name: Check server-kata Dockerfile target
        run: docker build --check --target server-kata -f docker/Dockerfile.server .

  kata-e2e:
    name: Linux/KVM E2E
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_kata_e2e }}
    needs: static
    runs-on: [self-hosted, linux, x64, kvm, kata]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Prepare evidence directory
        run: |
          rm -rf tmp/kata-evidence
          mkdir -p tmp/kata-evidence
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "runner_name=${RUNNER_NAME}"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "uname=$(uname -a)"
            echo "docker=$(docker --version)"
            echo "docker_compose=$(docker compose version)"
            echo "kvm_present=$([ -e /dev/kvm ] && echo true || echo false)"
            echo "kata_shim=${MEMOH_KATA_SHIM_PATH:-/opt/kata/bin/containerd-shim-kata-v2}"
            if [ -x "${MEMOH_KATA_SHIM_PATH:-/opt/kata/bin/containerd-shim-kata-v2}" ]; then
              "${MEMOH_KATA_SHIM_PATH:-/opt/kata/bin/containerd-shim-kata-v2}" --version || true
            fi
          } > tmp/kata-evidence/environment.txt

      - name: Check Kata host prerequisites
        run: scripts/check-kata-dev-env.sh

      - name: Run dev Kata E2E
        run: scripts/test-containerd-kata-e2e.sh
        env:
          MEMOH_KATA_EVIDENCE_DIR: tmp/kata-evidence

      - name: Run production Compose Kata E2E
        if: ${{ inputs.run_compose_e2e }}
        run: scripts/test-containerd-kata-compose-e2e.sh
        env:
          MEMOH_KATA_EVIDENCE_DIR: tmp/kata-evidence

      - name: Upload Kata evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: kata-evidence
          path: tmp/kata-evidence
          if-no-files-found: warn
