name: Go CI

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "db/postgres/queries/**/*.sql"
      - "db/postgres/migrations/**/*.sql"
      - "apps/web/src/store/__fixtures__/runtime-*.contract.json"
      - ".github/workflows/go-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "db/postgres/queries/**/*.sql"
      - "db/postgres/migrations/**/*.sql"
      - "apps/web/src/store/__fixtures__/runtime-*.contract.json"
      - ".github/workflows/go-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          only-new-issues: true

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.txt
          if-no-files-found: error

  session-runtime-backend:
    name: Session Runtime (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Redis
            image: redis:8-alpine
            env_name: MEMOH_TEST_REDIS_URL
          - target: Valkey
            image: valkey/valkey:8-alpine
            env_name: MEMOH_TEST_VALKEY_URL
    services:
      runtime:
        image: ${{ matrix.image }}
        ports:
          - 6379/tcp
        options: >-
          --health-cmd "sh -c 'redis-cli ping || valkey-cli ping'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run distributed session runtime contracts
        env:
          MEMOH_TEST_DISTRIBUTED_REQUIRED: "1"
          RUNTIME_URL: redis://127.0.0.1:${{ job.services.runtime.ports['6379'] }}/0
          RUNTIME_ENV_NAME: ${{ matrix.env_name }}
        run: |
          env "$RUNTIME_ENV_NAME=$RUNTIME_URL" \
            go test -v -race -count=1 -timeout 90s \
            ./internal/sessionruntime ./internal/handlers ./cmd/agent
          env "$RUNTIME_ENV_NAME=$RUNTIME_URL" \
            go test -v -race -count=1 -timeout 90s \
            -run '^TestACPWorkspaceEffectsRejectStaleRedisOwner$' ./internal/acpclient

  session-runtime-postgres:
    name: Session Runtime (PostgreSQL fencing)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: memoh_runtime_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d memoh_runtime_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379/tcp
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run durable runtime fencing contracts
        env:
          MEMOH_TEST_POSTGRES_REQUIRED: "1"
          MEMOH_TEST_CROSS_BACKEND_REQUIRED: "1"
          MEMOH_TEST_VALKEY_URL: redis://127.0.0.1:${{ job.services.valkey.ports['6379'] }}/0
          TEST_POSTGRES_BOOTSTRAP_SCHEMA: "1"
          TEST_POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/memoh_runtime_test?sslmode=disable
        run: |
          go test -v -race -count=1 -timeout 90s \
            -run '^TestPostgresRuntimeFence' ./internal/runtimefence
          TEST_POSTGRES_BOOTSTRAP_SCHEMA=0 go test -v -race -count=1 -timeout 90s \
            -run '^TestPostgresRuntimeFence' ./internal/message
          TEST_POSTGRES_BOOTSTRAP_SCHEMA=0 go test -v -race -count=1 -timeout 90s \
            -run '^TestPostgresRuntimeFence' ./internal/sessionruntime
          TEST_POSTGRES_BOOTSTRAP_SCHEMA=0 go test -v -race -count=1 -timeout 90s \
            -run '^TestPostgresRuntimeFence' ./internal/acpagent
