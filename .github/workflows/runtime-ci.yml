name: Remote Runtime CI

on:
  push:
    branches: ["main"]
    paths:
      - "packages/runtime/**"
      - "internal/workspace/bridgepb/bridge.proto"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - ".github/workflows/runtime-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "packages/runtime/**"
      - "internal/workspace/bridgepb/bridge.proto"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - ".github/workflows/runtime-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test runtime (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-26, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck runtime
        run: pnpm --filter @memohai/runtime typecheck

      - name: Test runtime
        run: pnpm --filter @memohai/runtime test

      - name: Build runtime
        run: pnpm --filter @memohai/runtime build
