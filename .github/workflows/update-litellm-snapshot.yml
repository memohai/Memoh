name: Update LiteLLM snapshot
on:
  schedule:
    # Weekly, Mondays 04:00 UTC.
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh capability snapshot
        run: ./scripts/sync-litellm-snapshot.sh

      - name: Detect change and build summary
        id: summary
        run: |
          set -euo pipefail
          file=internal/capabilities/litellm_snapshot.json.gz

          # Compare DECOMPRESSED content, not gzip bytes: gzip output differs
          # across implementations (macOS vs GNU), so a re-compression alone must
          # not look like a change. jq -S normalizes key order on both sides.
          if git cat-file -e "HEAD:$file" 2>/dev/null; then
            git show "HEAD:$file" | gzip -dc | jq -S . > /tmp/old.json
          else
            echo '{}' > /tmp/old.json
          fi
          gzip -dc "$file" | jq -S . > /tmp/new.json

          if diff -q /tmp/old.json /tmp/new.json >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Snapshot content unchanged; nothing to do."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

          jq -r 'keys[]' /tmp/old.json | sort > /tmp/old_keys.txt
          jq -r 'keys[]' /tmp/new.json | sort > /tmp/new_keys.txt
          comm -13 /tmp/old_keys.txt /tmp/new_keys.txt > /tmp/added.txt || true
          comm -23 /tmp/old_keys.txt /tmp/new_keys.txt > /tmp/removed.txt || true
          # Models present in both sides whose capability fields changed, with
          # field-level before->after so a poisoned/surprising upstream change is
          # visible in the PR body (the committed .gz diff itself is opaque).
          jq -nr \
            --slurpfile o /tmp/old.json \
            --slurpfile n /tmp/new.json \
            '($o[0]) as $old | ($n[0]) as $new
             | $new | keys[] as $k
             | select(($old | has($k)) and ($old[$k] != $new[$k]))
             | (($old[$k] + $new[$k]) | keys) as $fields
             | [ $fields[] | . as $f
                 | {f:$f, ov:$old[$k][$f], nv:$new[$k][$f]}
                 | select(.ov != .nv)
                 | "\(.f): \(.ov|tojson) -> \(.nv|tojson)" ] as $ch
             | "\($k): " + ($ch | join(", "))' \
            > /tmp/changed.txt

          old_count=$(jq 'length' /tmp/old.json)
          new_count=$(jq 'length' /tmp/new.json)
          added_count=$(grep -c . /tmp/added.txt || true)
          removed_count=$(grep -c . /tmp/removed.txt || true)
          changed_count=$(grep -c . /tmp/changed.txt || true)

          emit_list() {
            # $1 = title, $2 = file
            local count
            count=$(grep -c . "$2" || true)
            [ "$count" -eq 0 ] && return 0
            echo "<details><summary>$1 ($count)</summary>"
            echo
            echo '```'
            head -n 200 "$2"
            [ "$count" -gt 200 ] && echo "... (+$((count - 200)) more)"
            echo '```'
            echo
            echo "</details>"
          }

          {
            echo "Automated refresh of the embedded LiteLLM capability snapshot consumed by \`internal/capabilities\`."
            echo
            echo "- Models: **${old_count} -> ${new_count}**"
            echo "- Added: **${added_count}**, Removed: **${removed_count}**, Capability-changed: **${changed_count}**"
            echo
            emit_list "Added" /tmp/added.txt
            emit_list "Removed" /tmp/removed.txt
            emit_list "Capability changed" /tmp/changed.txt
            echo
            echo "The committed file is gzipped, so the file diff is opaque; the lists above are the human-readable summary. Review before merging."
          } > /tmp/pr_body.md

      - name: Create pull request
        if: steps.summary.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-litellm-snapshot
          base: main
          title: "chore: refresh LiteLLM capability snapshot"
          body-path: /tmp/pr_body.md
          commit-message: "chore: refresh LiteLLM capability snapshot"
          add-paths: internal/capabilities/litellm_snapshot.json.gz
          delete-branch: true
