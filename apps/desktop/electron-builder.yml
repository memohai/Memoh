appId: ai.memoh.desktop
productName: Memoh Local
copyright: Copyright © 2026 Memoh
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - resources/icon.png
  - resources/tray-icon.png
  - "!**/.vscode/*"
  - "!src/*"
  - "!scripts/*"
  - "!AGENTS.md"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintrc.cjs,.eslintignore,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
extraResources:
  - from: resources/server
    to: server
  - from: resources/cli
    to: cli
  - from: resources/runtime
    to: runtime
  - from: resources/config
    to: config
  - from: resources/providers
    to: providers
  - from: resources/qdrant
    to: qdrant
    filter:
      - ${env.MEMOH_DESKTOP_QDRANT_TARGET}/**/*
  - from: resources/gstreamer
    to: gstreamer
    filter:
      - ${env.MEMOH_DESKTOP_GSTREAMER_TARGET}/**/*
mac:
  category: public.app-category.productivity
  # Electron 42 ships Chromium 148, whose hard floor is macOS 12 (Monterey).
  # Pinning it stamps LSMinimumSystemVersion so the installer refuses macOS 11
  # rather than installing an app that can't launch.
  minimumSystemVersion: '12.0'
  target:
    - dmg
  icon: build/icon.icon
  artifactName: Memoh-Local-${version}-mac-${arch}.${ext}
  notarize: true
dmg:
  icon: build/icon.icns
  sign: true
  # 双击自安装样式:卷宗名即 Finder 窗口标题;背景图(build/background.png +
  # background@2x.png,660x440 逻辑)烤入装饰文案与品牌光晕。
  title: Install Memoh
  background: build/background.png
  window:
    width: 660
    height: 440
  iconSize: 128
  # 只摆 app 一个活图标,居中偏下,对齐背景图光晕。显式给出 contents 后
  # electron-builder 不再自动追加 /Applications 软链 —— 双击式不需要拖拽目标。
  # x/y 复刻用户认可的预览 DMG(make-preview-dmg.sh 的 330/254);真机签名
  # 打包挂载后若图标偏高/偏低,只需微调这里的 y。
  contents:
    - x: 330
      y: 254
      type: file
linux:
  category: Utility
  executableName: memoh-local
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  maintainer: Memoh
  icon: build/icon.png
  artifactName: Memoh-Local-${version}-linux-${arch}.${ext}
deb:
  packageName: memoh-local
rpm:
  packageName: memoh-local
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  artifactName: Memoh-Local-${version}-win-${arch}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
