<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Memoh DMG background</title>
  <style>
    /*
     * DMG 背景设计源。渲染的是挂载后 Finder 窗口「内容区」的背景层。
     *
     * 铁律:这里只画装饰(标题/副标题/光晕)。app 图标和它下方的文件名是
     * Finder 摆上去的「活图标」,由 electron-builder 的 dmg.contents 定坐标 ——
     * 背景图里画了就会和活图标重叠。
     *
     * 预览态(默认):显示一个半透明占位图标 + 文件名,只为对齐参考。
     * 导出态(?export):隐藏占位,只留纯装饰,交给打包配置。
     *
     * 尺寸按 @1x 逻辑像素写;导出时用 deviceScaleFactor:2 截 @2x 清晰图。
     */
    :root {
      --stage-w: 660px;
      --stage-h: 440px;

      /* 图标落点(水平居中,略偏下),活图标会被摆到这里。
       * cy 收紧到贴近文字:副标题底约 152px,图标顶到它约 38px,不再漂在下方。 */
      --icon-cx: 330px;
      --icon-cy: 254px;
      --icon-size: 128px;

      --brand: #7948ff;
      --brand-soft: #bd69ff;
      --ink: #1d1d1f;       /* Apple 标准近黑标题 */
      --ink-soft: #86868b;  /* Apple 标准灰副标题 */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #2b2b2b; /* 预览时窗口外的衬底,导出不入图 */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* 这就是被截图的「背景图」本体,正好一个窗口内容区大小。 */
    .stage {
      position: relative;
      width: var(--stage-w);
      height: var(--stage-h);
      overflow: hidden;
      /* 极淡的竖向渐变,纯白太硬,给一点点纵深。 */
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfd 100%);
    }

    /* 图标落点后面的品牌紫光晕 —— 给居中图标一个视觉锚,不致漂浮在空白里。 */
    .glow {
      position: absolute;
      left: var(--icon-cx);
      top: var(--icon-cy);
      width: 460px;
      height: 460px;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle at center,
        color-mix(in srgb, var(--brand) 14%, transparent) 0%,
        color-mix(in srgb, var(--brand-soft) 7%, transparent) 34%,
        transparent 64%
      );
      pointer-events: none;
    }

    .copy {
      position: absolute;
      left: 0;
      right: 0;
      top: 70px;
      text-align: center;
    }
    .title {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.018em;
      color: var(--ink);
    }
    .subtitle {
      margin-top: 12px;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--ink-soft);
    }

    /* ---- 占位层:预览对齐用,导出时隐藏 ---- */
    .placeholder {
      position: absolute;
      left: var(--icon-cx);
      top: var(--icon-cy);
      width: var(--icon-size);
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    .placeholder img {
      width: var(--icon-size);
      height: var(--icon-size);
      display: block;
      opacity: 0.92;
    }
    .placeholder .name {
      margin-top: 14px;
      font-size: 13px;
      font-weight: 400;
      color: #4b4b4d;
    }
    body.export .placeholder { display: none; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="copy">
      <div class="title">Install Memoh</div>
      <div class="subtitle">Double-click the icon to install</div>
    </div>
    <!-- 占位:真实的活图标 + 文件名会被 Finder 摆在同一坐标 -->
    <div class="placeholder">
      <img src="../build/icon.png" alt="" />
      <div class="name">Memoh</div>
    </div>
  </div>

  <script>
    // ?export → 进入导出态,只保留纯装饰背景。
    if (new URLSearchParams(location.search).has('export')) {
      document.body.classList.add('export')
    }
  </script>
</body>
</html>
