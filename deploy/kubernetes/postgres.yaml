apiVersion: v1
kind: Service
metadata:
  name: memoh-postgres
  namespace: memoh
spec:
  selector:
    app.kubernetes.io/name: memoh-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memoh-postgres
  namespace: memoh
spec:
  serviceName: memoh-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoh-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoh-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg18-trixie
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: memoh-postgres
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "memoh"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
