apiVersion: v1
kind: Service
metadata:
  name: memoh-browser
  namespace: memoh
spec:
  selector:
    app.kubernetes.io/name: memoh-browser
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoh-browser
  namespace: memoh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoh-browser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoh-browser
    spec:
      containers:
        - name: browser
          image: memohai/browser:chromium-latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MEMOH_CONFIG_PATH
              value: /config/config.toml
            - name: BROWSER_CORES
              value: chromium
          ports:
            - name: http
              containerPort: 8083
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config/config.toml
              subPath: config.toml
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: memoh-config
