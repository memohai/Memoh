apiVersion: v1
kind: Service
metadata:
  name: memoh-qdrant
  namespace: memoh
spec:
  selector:
    app.kubernetes.io/name: memoh-qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memoh-qdrant
  namespace: memoh
spec:
  serviceName: memoh-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoh-qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoh-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
