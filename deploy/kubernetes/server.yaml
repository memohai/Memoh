apiVersion: v1
kind: Service
metadata:
  name: memoh-server
  namespace: memoh
spec:
  selector:
    app.kubernetes.io/name: memoh-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memoh-data
  namespace: memoh
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoh-server
  namespace: memoh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoh-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoh-server
    spec:
      serviceAccountName: memoh-server
      initContainers:
        - name: migrate
          image: memohai/server:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/memoh-server", "migrate", "up"]
          volumeMounts:
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
              readOnly: true
      containers:
        - name: server
          image: memohai/server:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/memoh-server", "serve"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
              readOnly: true
            - name: data
              mountPath: /opt/memoh/data
      volumes:
        - name: config
          secret:
            secretName: memoh-config
        - name: data
          persistentVolumeClaim:
            claimName: memoh-data
