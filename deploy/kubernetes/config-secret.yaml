apiVersion: v1
kind: Secret
metadata:
  name: memoh-config
  namespace: memoh
type: Opaque
stringData:
  config.toml: |
    [log]
    level = "info"
    format = "text"

    [server]
    addr = ":8080"

    [admin]
    username = "admin"
    password = "CHANGE-ME"
    email = "admin@memoh.local"

    [auth]
    jwt_secret = "CHANGE-ME-TO-A-RANDOM-SECRET"
    jwt_expires_in = "168h"

    timezone = "UTC"

    [database]
    driver = "postgres"

    [container]
    backend = "kubernetes"
    default_image = "debian:bookworm-slim"
    image_pull_policy = "if_not_present"
    data_root = "/opt/memoh/data"
    runtime_dir = "/opt/memoh/runtime"

    [kubernetes]
    namespace = "memoh"
    in_cluster = true
    service_account_name = "memoh-workspace"
    image_pull_secret = ""
    pvc_storage_class = ""
    pvc_size = "10Gi"
    bridge_port = 9090

    [postgres]
    host = "memoh-postgres"
    port = 5432
    user = "memoh"
    password = "CHANGE-ME"
    database = "memoh"
    sslmode = "disable"

    [sparse]
    base_url = "http://memoh-sparse:8085"

    [browser_gateway]
    host = "0.0.0.0"
    port = 8083
    server_addr = "memoh-server:8080"

    [web]
    host = "0.0.0.0"
    port = 8082
---
apiVersion: v1
kind: Secret
metadata:
  name: memoh-postgres
  namespace: memoh
type: Opaque
stringData:
  POSTGRES_DB: memoh
  POSTGRES_USER: memoh
  POSTGRES_PASSWORD: CHANGE-ME
