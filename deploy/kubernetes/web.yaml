apiVersion: v1
kind: Service
metadata:
  name: memoh-web
  namespace: memoh
spec:
  selector:
    app.kubernetes.io/name: memoh-web
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoh-web
  namespace: memoh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoh-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoh-web
    spec:
      containers:
        - name: web
          image: memohai/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
