# Memoh configuration template
# Copy to config.toml and adjust values for your environment.
# For local development, use: cp devenv/app.dev.toml config.toml

[log]
level = "info"
format = "text"

[server]
addr = ":8080"

[admin]
username = "admin"
password = "admin123"
email = "admin@memoh.local"

[auth]
jwt_secret = "CHANGE-ME-TO-A-RANDOM-SECRET"
jwt_expires_in = "168h"

timezone = "UTC"

[database]
driver = "postgres"

[container]
# Required. Supported values: docker, kubernetes, containerd, apple.
backend = "docker"

[containerd]
socket_path = "/run/containerd/containerd.sock"
namespace = "default"

[kubernetes]
# Enable with [container].backend = "kubernetes".
# In-cluster mode uses the pod ServiceAccount; set kubeconfig for external control.
namespace = "default"
in_cluster = true
kubeconfig = ""
service_account_name = ""
image_pull_secret = ""
pvc_storage_class = ""
pvc_size = "10Gi"
bridge_port = 9090

[workspace]
# registry = "memoh.cn"  # Uncomment for China mainland mirror
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
snapshotter = "overlayfs"
data_root = "data"
cni_bin_dir = "/opt/cni/bin"
cni_conf_dir = "/etc/cni/net.d"

[postgres]
host = "127.0.0.1"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[sqlite]
path = "data/memoh.db"
wal = true
busy_timeout_ms = 5000

[qdrant]
base_url = "http://127.0.0.1:6334"
api_key = ""
timeout_seconds = 10

[sparse]
base_url = "http://127.0.0.1:8085"

[registry]
providers_dir = "conf/providers"

[browser_gateway]
host = "127.0.0.1"
port = 8083
server_addr = ":8080"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[web]
host = "127.0.0.1"
port = 8082
