# Memoh Windows configuration template
# It is an experimental feature and not recommended for production.

[log]
level = "debug"
format = "text"

[server]
addr = ":8080"
rpc_listen_addr = ":9090"

[channel]
addr = ":8081"
rpc_listen_addr = ":9091"

[internal_rpc]
server_target = "127.0.0.1:9090"
channel_target = "127.0.0.1:9091"
shared_secret = ""

[admin]
username = "admin"
password = "admin123"
email = "dev@memoh.local"

[auth]
jwt_secret = "memoh-dev-secret-do-not-use-in-production"
jwt_expires_in = "168h"

timezone = "UTC"

[database]
# Memoh now supports PostgreSQL only.
driver = "postgres"

[container]
# Windows template uses containerd by default. The Docker backend is
# available for custom deployments, but its runtime paths must match the host.
backend = "containerd"
# registry = "memoh.cn"  # Uncomment for China mainland mirror
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
# containerd snapshotter used by workspace containers.
snapshotter = "overlayfs"
data_root = "data"

[containerd]
# Windows containerd usually exposes a named pipe endpoint.
# If your environment uses another pipe name or tcp endpoint, change this value.
socket_path = "npipe:////./pipe/containerd-containerd"
namespace = "default"
runtime_type = "io.containerd.runc.v2"

[docker]
# Used when [container].backend = "docker".
# Leave empty to use Docker's default named pipe or DOCKER_HOST.
host = ""

[postgres]
host = "127.0.0.1"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[pgvector]
enabled = false
host = "127.0.0.1"
port = 5432
user = "memoh"
password = ""
database = "memoh_vector"
sslmode = "disable"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"

[web]
host = "127.0.0.1"
port = 8082
