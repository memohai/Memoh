# Memoh Windows configuration template
# It is an experimental feature and not recommended for production.

[log]
level = "debug"
format = "text"

[server]
addr = ":8080"

[admin]
username = "admin"
password = "admin123"
email = "dev@memoh.local"

[auth]
jwt_secret = "memoh-dev-secret-do-not-use-in-production"
jwt_expires_in = "168h"

[skill_ref]
current_kid = "primary"
keys = { primary = "CHANGE-ME-TO-A-BASE64-32-BYTE-SKILL-REF-KEY" }
max_requested_skills = 5
max_single_skill_context_bytes = 65536
max_total_skill_context_bytes = 262144

timezone = "UTC"

[database]
# Supported values: "postgres" or "sqlite".
# SQLite is useful for single-node testing. Use PostgreSQL when you want to
# match the default Docker deployment.
driver = "postgres"

[container]
# Windows template uses containerd by default. The Docker backend is
# available for custom deployments, but its runtime paths must match the host.
backend = "containerd"
# registry = "memoh.cn"  # Uncomment for China mainland mirror
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
# containerd snapshotter used by workspace containers.
snapshotter = "overlayfs"
data_root = "data"

[containerd]
# Windows containerd usually exposes a named pipe endpoint.
# If your environment uses another pipe name or tcp endpoint, change this value.
socket_path = "npipe:////./pipe/containerd-containerd"
namespace = "default"
runtime_type = "io.containerd.runc.v2"

[docker]
# Used when [container].backend = "docker".
# Leave empty to use Docker's default named pipe or DOCKER_HOST.
host = ""

[postgres]
# Used only when [database].driver = "postgres".
host = "127.0.0.1"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[sqlite]
# Used only when [database].driver = "sqlite".
path = "data/memoh.db"
wal = true
busy_timeout_ms = 5000

[qdrant]
base_url = "http://127.0.0.1:6334"
api_key = ""
timeout_seconds = 10

[sparse]
base_url = "http://127.0.0.1:8085"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"

[web]
host = "127.0.0.1"
port = 8082
