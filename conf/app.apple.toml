# Memoh Apple Container configuration (macOS / Darwin)
# Uses socktainer + Apple Containerization framework instead of containerd.

[log]
level = "debug"
format = "text"

[server]
addr = ":8080"

[admin]
username = "admin"
password = "admin123"
email = "dev@memoh.local"

[auth]
jwt_secret = "memoh-dev-secret-do-not-use-in-production"
jwt_expires_in = "168h"

timezone = "UTC"

[database]
# Memoh now supports PostgreSQL only.
driver = "postgres"

[container]
# Apple backend uses socktainer and the Apple Containerization framework.
# It is local-macOS oriented and does not support provider sidecar overlays.
backend = "apple"
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
# Local workspace state and bridge sockets.
data_root = "data"

[apple]
# NOTE: Apple Container are now experimental feature and only support on macOS 26 and later.
# socket_path and binary_path use sensible defaults when left empty.
socket_path = ""
binary_path = ""

[postgres]
host = "127.0.0.1"
port = 5432
# Owner/DDL role: runs migrations and owns the tables (bypasses FORCE RLS).
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"
# Restricted runtime role (memoh_app), created by migration 0107. Non-owner,
# non-superuser, so FORCE ROW LEVEL SECURITY enforces team isolation. Leave
# empty to fall back to the owner role.
app_user = "memoh_app"
app_password = "memoh_app"

[pgvector]
enabled = false
host = "127.0.0.1"
port = 5432
user = "memoh"
password = ""
database = "memoh_vector"
sslmode = "disable"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"
