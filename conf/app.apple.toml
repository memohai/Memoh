# Memoh Apple Container configuration (macOS / Darwin)
# Uses socktainer + Apple Containerization framework instead of containerd.

[log]
level = "debug"
format = "text"

[server]
addr = ":8080"

[admin]
username = "admin"
password = "admin123"
email = "dev@memoh.local"

[auth]
jwt_secret = "memoh-dev-secret-do-not-use-in-production"
jwt_expires_in = "168h"

[skill_ref]
current_kid = "primary"
keys = { primary = "CHANGE-ME-TO-A-BASE64-32-BYTE-SKILL-REF-KEY" }
max_requested_skills = 5
max_single_skill_context_bytes = 65536
max_total_skill_context_bytes = 262144

timezone = "UTC"

[database]
# Supported values: "postgres" or "sqlite".
# SQLite is often the simplest local option on macOS. Use PostgreSQL when you
# need an external database or want to match production more closely.
driver = "postgres"

[container]
# Apple backend uses socktainer and the Apple Containerization framework.
# It is local-macOS oriented and does not support provider sidecar overlays.
backend = "apple"
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
# Local workspace state and bridge sockets.
data_root = "data"

[apple]
# NOTE: Apple Container are now experimental feature and only support on macOS 26 and later.
# socket_path and binary_path use sensible defaults when left empty.
socket_path = ""
binary_path = ""

[postgres]
# Used only when [database].driver = "postgres".
host = "127.0.0.1"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[sqlite]
# Used only when [database].driver = "sqlite".
path = "data/memoh.db"
wal = true
busy_timeout_ms = 5000

[qdrant]
base_url = "http://127.0.0.1:6334"
api_key = ""
timeout_seconds = 10

[sparse]
base_url = "http://127.0.0.1:8085"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"
