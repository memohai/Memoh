# Memoh Apple Container configuration (macOS / Darwin)
# Uses socktainer + Apple Containerization framework instead of containerd.

[log]
level = "debug"
format = "text"

[server]
addr = ":8080"
rpc_listen_addr = "127.0.0.1:9090"

[channel]
addr = ":8081"
rpc_listen_addr = "127.0.0.1:9091"

[internal_rpc]
# Leave shared_secret empty to run the pre-split all-in-one deployment: the
# server embeds the channel runtime (external channels, email, webhooks) and
# no memoh-channel process or internal RPC is needed.
# Set a secret (e.g. `openssl rand -hex 32`) to split the channel runtime
# into its own memoh-channel process; the internal RPC is plaintext, so keep
# the listeners loopback-only unless the link is otherwise protected.
server_target = "127.0.0.1:9090"
channel_target = "127.0.0.1:9091"
shared_secret = ""

[admin]
username = "admin"
password = "admin123"
email = "dev@memoh.local"

[auth]
jwt_secret = "memoh-dev-secret-do-not-use-in-production"
jwt_expires_in = "168h"

timezone = "UTC"

[database]
# Memoh now supports PostgreSQL only.
driver = "postgres"

[container]
# Apple backend uses socktainer and the Apple Containerization framework.
# It is local-macOS oriented and does not support provider sidecar overlays.
backend = "apple"
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
# Local workspace state and bridge sockets.
data_root = "data"

[apple]
# NOTE: Apple Container are now experimental feature and only support on macOS 26 and later.
# socket_path and binary_path use sensible defaults when left empty.
socket_path = ""
binary_path = ""

[postgres]
host = "127.0.0.1"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[pgvector]
enabled = false
host = "127.0.0.1"
port = 5432
user = "memoh"
password = ""
database = "memoh_vector"
sslmode = "disable"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"
