# Memoh local desktop/development configuration.
# Runs the server directly on the host, uses Docker for container workspaces,
# and also enables trusted local workspaces.

[log]
level = "info"
format = "text"

[server]
addr = ":18731"

[webhook_tunnel]
mode = "disabled"
public_base_url = ""
listen_addr = "127.0.0.1:18734"
cloudflared_path = ""
target_url = ""
metrics_addr = "127.0.0.1:18735"
metrics_url = ""

[admin]
username = "admin"
password = "admin123"
email = "admin@memoh.local"

[auth]
jwt_secret = "LOCAL-DEV-CHANGE-ME"
jwt_expires_in = "168h"

[skill_ref]
current_kid = "local"
keys = { local = "CHANGE-ME-TO-A-BASE64-32-BYTE-SKILL-REF-KEY" }
max_requested_skills = 5
max_single_skill_context_bytes = 65536
max_total_skill_context_bytes = 262144

timezone = "UTC"

[database]
driver = "sqlite"

[container]
# Keep Docker available for bots that still need isolated workspaces.
backend = "docker"
default_image = "memohai/workspace:debian"
image_pull_policy = "if_not_present"
snapshotter = "docker"
data_root = "data/local"
runtime_dir = "data/runtime"

[docker]
# Leave empty to let desktop startup detect Docker Desktop / Docker Engine sockets.
host = ""

[local]
# Local workspaces run with the server process permissions and have no sandbox.
# This is intended for trusted desktop/local development only.
enabled = true
default_workspace_parent = "~/.memoh/workspaces"
metadata_root = "data/local/containers"
allow_absolute_paths = true

[containerd]
socket_path = "/run/containerd/containerd.sock"
namespace = "default"
runtime_type = "io.containerd.runc.v2"

[apple]
socket_path = ""
binary_path = ""

[sqlite]
path = "data/local/memoh.db"
wal = true
busy_timeout_ms = 5000

[postgres]
host = "127.0.0.1"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[qdrant]
base_url = "http://127.0.0.1:6334"
api_key = ""
timeout_seconds = 10

[sparse]
base_url = "http://127.0.0.1:8085"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"

[web]
host = "127.0.0.1"
port = 8082
