[clients.notion]
display_name = "Notion"
client_id = "${NOTION_OAUTH_CLIENT_ID}"
client_secret = "${NOTION_OAUTH_CLIENT_SECRET}"
authorization_endpoint = "https://mcp.notion.com/authorize"
token_endpoint = "https://mcp.notion.com/token"
redirect_uri = ""
allowed_scopes = []

[clients.linear]
display_name = "Linear"
client_id = "${LINEAR_OAUTH_CLIENT_ID}"
client_secret = "${LINEAR_OAUTH_CLIENT_SECRET}"
authorization_endpoint = "https://linear.app/oauth/authorize"
token_endpoint = "https://api.linear.app/oauth/token"
redirect_uri = ""
allowed_scopes = []

[clients.github]
display_name = "GitHub"
client_id = "${GITHUB_OAUTH_CLIENT_ID}"
client_secret = "${GITHUB_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = ["repo", "read:org"]

[clients.gmail]
display_name = "Gmail"
client_id = "${GMAIL_OAUTH_CLIENT_ID}"
client_secret = "${GMAIL_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = ["https://mail.google.com/"]

[clients.google]
display_name = "Google Workspace"
client_id = "${GOOGLE_OAUTH_CLIENT_ID}"
client_secret = "${GOOGLE_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = [
  "https://www.googleapis.com/auth/drive",
  "https://www.googleapis.com/auth/calendar",
  "https://www.googleapis.com/auth/gmail.modify",
  "https://www.googleapis.com/auth/gmail.compose",
]

[clients.hubspot]
display_name = "HubSpot"
client_id = "${HUBSPOT_OAUTH_CLIENT_ID}"
client_secret = "${HUBSPOT_OAUTH_CLIENT_SECRET}"
authorization_endpoint = "https://mcp.hubspot.com/oauth/authorize/user"
token_endpoint = "https://mcp.hubspot.com/oauth/v3/token"
redirect_uri = ""
allowed_scopes = []

[clients.slack]
display_name = "Slack"
client_id = "${SLACK_OAUTH_CLIENT_ID}"
client_secret = "${SLACK_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = [
  "search:read.public",
  "search:read.private",
  "search:read.mpim",
  "search:read.im",
  "search:read.files",
  "files:read",
  "emoji:read",
  "search:read.users",
  "channels:history",
  "groups:history",
  "mpim:history",
  "im:history",
  "channels:read",
  "groups:read",
  "mpim:read",
  "users:read",
  "users:read.email",
]

[clients.figma]
display_name = "Figma"
client_id = "${FIGMA_OAUTH_CLIENT_ID}"
client_secret = "${FIGMA_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = ["mcp:connect"]

[clients.asana]
display_name = "Asana"
client_id = "${ASANA_OAUTH_CLIENT_ID}"
client_secret = "${ASANA_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = []

[clients.microsoft]
display_name = "Microsoft"
client_id = "${MICROSOFT_OAUTH_CLIENT_ID}"
client_secret = "${MICROSOFT_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = [
  "MCP.User.Read.All",
  "MCP.Group.Read.All",
  "MCP.GroupMember.Read.All",
  "MCP.Application.Read.All",
  "MCP.Device.Read.All",
  "MCP.Organization.Read.All",
  "MCP.Reports.Read.All",
  "MCP.AuditLog.Read.All",
  "MCP.DirectoryRecommendations.Read.All",
]
